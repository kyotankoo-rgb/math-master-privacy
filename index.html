<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - Math Master Series</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .app-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .app-link {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .app-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .app-link.addition { border-color: #2196F3; }
        .app-link.addition:hover { background: #E3F2FD; }
        .app-link.subtraction { border-color: #4CAF50; }
        .app-link.subtraction:hover { background: #E8F5E9; }
        .app-link.multiplication { border-color: #FF9800; }
        .app-link.multiplication:hover { background: #FFF3E0; }
        .app-link.division { border-color: #9C27B0; }
        .app-link.division:hover { background: #F3E5F5; }
        .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
            color: white;
        }
        .addition .icon { background: #2196F3; }
        .subtraction .icon { background: #4CAF50; }
        .multiplication .icon { background: #FF9800; }
        .division .icon { background: #9C27B0; }
        .app-info h3 {
            font-size: 16px;
            margin-bottom: 3px;
        }
        .app-info p {
            font-size: 12px;
            color: #888;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        .footer a {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Privacy Policy</h1>
        <p class="subtitle">Select an app to view its privacy policy</p>

        <div class="app-list">
            <a href="addition.html" class="app-link addition">
                <div class="icon">+</div>
                <div class="app-info">
                    <h3>Addition Master</h3>
                    <p>더하기 마스터</p>
                </div>
            </a>

            <a href="subtraction.html" class="app-link subtraction">
                <div class="icon">−</div>
                <div class="app-info">
                    <h3>Subtraction Master</h3>
                    <p>빼기 마스터</p>
                </div>
            </a>

            <a href="multiplication.html" class="app-link multiplication">
                <div class="icon">×</div>
                <div class="app-info">
                    <h3>Multiplication Master</h3>
                    <p>곱하기 마스터</p>
                </div>
            </a>

            <a href="division.html" class="app-link division">
                <div class="icon">÷</div>
                <div class="app-info">
                    <h3>Division Master</h3>
                    <p>나누기 마스터</p>
                </div>
            </a>
        </div>

        <p class="footer">
            Developer: Kyotan Koo<br>
            Contact: <a href="mailto:kyotankoo@gmail.com">kyotankoo@gmail.com</a>
        </p>
    </div>
</body>
</html>
